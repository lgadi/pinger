name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: ./build.sh

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: Pinger
          path: Pinger.app

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: Pinger

      - name: Make executable
        run: chmod +x Pinger.app/Contents/MacOS/Pinger

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: Pinger.app
          generate_release_notes: true
