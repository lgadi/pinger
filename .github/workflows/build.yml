name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: ./build.sh

      - name: Zip app bundle
        run: zip -r --symlinks Pinger.app.zip Pinger.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pinger
          path: Pinger.app.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create DMG
        run: ./package.sh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: Pinger.dmg
          generate_release_notes: true
